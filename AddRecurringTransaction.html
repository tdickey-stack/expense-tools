<!DOCTYPE html>
<html>
  <head>
    <base target="_top">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: 'Montserrat', Arial, sans-serif;
        padding: 16px;
        margin: 0;
        color: #1f2937;
        background: #f8fafc;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }

      .logo {
        display: block;
        max-width: 220px;
        height: auto;
        margin: 0 auto 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 700;
        color: #111827;
      }

      p {
        font-size: 14px;
        color: #4b5563;
        line-height: 1.5;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 18px;
      }

      th {
        text-align: left;
        font-size: 12px;
        font-weight: 600;
        color: #4b5563;
        padding: 8px 4px;
      }

      td {
        padding: 6px 4px;
        vertical-align: middle;
      }

      input,
      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px;
        font-family: 'Montserrat', Arial, sans-serif;
        font-size: 13px;
      }

      .button-row {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'Montserrat', Arial, sans-serif;
        cursor: pointer;
        background: #EF3B2D;
        color: #FFFFFF;
      }

      button:hover {
        opacity: 0.92;
      }

      .secondary {
        background: #374151;
      }

      .remove-btn {
        width: 100%;
        padding: 10px 12px;
        background: #9ca3af;
      }

      #status {
        margin-top: 14px;
        font-size: 13px;
      }

      .success {
        color: #047857;
      }

      .error {
        color: #b91c1c;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <img
        src="https://media.thechurchcoassets.com/accounts/4378/66632b98-d6c1-499b-8b61-f842224fe73b-./CP-Logo_CrossPointe-Red.png"
        alt="CrossPointe Logo"
        class="logo"
      />

      <h1>Manage Recurring Transactions</h1>

      <p>
        Add keywords that appear in transaction descriptions, then choose where those charges should go and what reason should be added.
      </p>

      <table>
        <thead>
          <tr>
            <th style="width: 22%;">Keyword</th>
            <th style="width: 24%;">Account</th>
            <th style="width: 24%;">Subaccount</th>
            <th style="width: 22%;">Reason for Expense</th>
            <th style="width: 8%;">Remove</th>
          </tr>
        </thead>
        <tbody id="rulesBody"></tbody>
      </table>

      <div class="button-row">
        <button class="secondary" onclick="addRuleRow()">Add Recurring Transaction</button>
        <button onclick="saveRules()">Save Changes</button>
      </div>

      <p id="status"></p>
    </div>

    <script>
      let accountOptions = [];
      let ministrySubaccounts = [];
      let operatingMap = {};
      let designatedAccounts = [];

      function loadOptionsAndRules() {
        google.script.run
          .withSuccessHandler(function(data) {
            accountOptions = data.accountOptions || [];
            ministrySubaccounts = data.ministrySubaccounts || [];
            operatingMap = data.operatingMap || {};
            designatedAccounts = data.designatedAccounts || [];

            const rules = data.rules || [];

            if (rules.length === 0) {
              addRuleRow();
            } else {
              rules.forEach(rule =>
                addRuleRow(rule.keyword, rule.account, rule.subaccount, rule.reason)
              );
            }
          })
          .withFailureHandler(function(error) {
            showStatus('Failed to load: ' + error.message, 'error');
          })
          .getRecurringTransactionManagerData();
      }

      function addRuleRow(keyword = '', account = '', subaccount = '', reason = '') {
        const tbody = document.getElementById('rulesBody');
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>
            <input type="text" class="keyword" value="${escapeHtml(keyword)}" placeholder="Adobe, FACEBK, CCLI">
          </td>
          <td>
            <select class="account" onchange="updateSubaccountDropdown(this)">
              ${buildOptions(accountOptions, account, 'Select account')}
            </select>
          </td>
          <td>
            <select class="subaccount"></select>
          </td>
          <td>
            <input type="text" class="reason" value="${escapeHtml(reason)}" placeholder="Monthly subscription, supplies, etc.">
          </td>
          <td>
            <button class="remove-btn" onclick="removeRuleRow(this)">X</button>
          </td>
        `;

        tbody.appendChild(tr);

        const accountSelect = tr.querySelector('.account');
        const subaccountSelect = tr.querySelector('.subaccount');

        populateSubaccountDropdown(accountSelect.value, subaccountSelect, subaccount);
      }

      function updateSubaccountDropdown(accountSelect) {
        const row = accountSelect.closest('tr');
        const subaccountSelect = row.querySelector('.subaccount');

        populateSubaccountDropdown(accountSelect.value, subaccountSelect, '');
      }

      function populateSubaccountDropdown(account, subaccountSelect, selectedValue) {
        let options = [];

        if (account === 'Designated') {
          options = designatedAccounts;
        } else if (operatingMap[account]) {
          options = operatingMap[account];
        } else {
          options = ministrySubaccounts;
        }

        subaccountSelect.innerHTML = buildOptions(options, selectedValue, 'Select subaccount');
      }

      function removeRuleRow(button) {
        button.closest('tr').remove();

        const tbody = document.getElementById('rulesBody');
        if (tbody.children.length === 0) {
          addRuleRow();
        }
      }

      function buildOptions(values, selectedValue, placeholder) {
        let html = `<option value="">${placeholder}</option>`;

        values.forEach(value => {
          const selected = value === selectedValue ? 'selected' : '';
          html += `<option value="${escapeHtml(value)}" ${selected}>${escapeHtml(value)}</option>`;
        });

        return html;
      }

      function saveRules() {
        const rows = Array.from(document.querySelectorAll('#rulesBody tr'));

        const rules = rows
          .map(row => ({
            keyword: row.querySelector('.keyword').value.trim(),
            account: row.querySelector('.account').value.trim(),
            subaccount: row.querySelector('.subaccount').value.trim(),
            reason: row.querySelector('.reason').value.trim()
          }))
          .filter(rule => rule.keyword || rule.account || rule.subaccount || rule.reason);

        const incomplete = rules.some(rule =>
          !rule.keyword || !rule.account || !rule.subaccount || !rule.reason
        );

        if (incomplete) {
          showStatus('Please complete all fields or remove incomplete rows.', 'error');
          return;
        }

        showStatus('Saving...', '');

        google.script.run
          .withSuccessHandler(function() {
            showStatus('Saved ✓', 'success');

            setTimeout(function() {
              google.script.host.close();
            }, 300);
          })
          .withFailureHandler(function(error) {
            showStatus('Save failed: ' + error.message, 'error');
          })
          .saveRecurringTransactions(rules);
      }

      function showStatus(message, type) {
        const status = document.getElementById('status');
        status.textContent = message;
        status.className = type;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      loadOptionsAndRules();
    </script>
  </body>
</html>
